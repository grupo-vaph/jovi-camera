<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C&acirc;mera - Jovi Camera</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="celular">
    <div class="status-bar">
      <span>17:56</span>
      <span>5G &middot; 100%</span>
    </div>

    <header class="camera-top">
      <button type="button" aria-label="Flash">Flash</button>
      <button type="button" aria-label="HDR">HDR</button>
      <button type="button" aria-label="Modo IA">AI</button>
      <button type="button" aria-label="Configura&ccedil;&otilde;es">Config</button>
    </header>

    <main class="viewport-camera">
      <span>Aponte para o cen&aacute;rio</span>
    </main>

    <section class="camera-bottom">
      <div class="zoom-chips">
        <span class="chip">0.6x</span>
        <span class="chip chip-ativo">1x</span>
        <span class="chip">2x</span>
      </div>

      <nav class="modos-camera">
        <a href="#" class="modo">Noite</a>
        <a href="#" class="modo">Retrato</a>
        <a href="#" class="modo modo-ativo">Foto</a>
        <a href="#" class="modo">V&iacute;deo</a>
        <a href="ia-sugere.html" class="modo">Estudo</a>
      </nav>

      <div class="controles-camera">
        <a href="galeria.html" class="miniatura" aria-label="Abrir galeria"></a>
        <button type="button" class="obturador" aria-label="Capturar foto">
          <span class="obturador-interno"></span>
        </button>
        <button type="button" class="switch-camera" aria-label="Trocar c&acirc;mera">&#8634;</button>
      </div>
    </section>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
