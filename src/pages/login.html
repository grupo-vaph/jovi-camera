<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jovi Camera</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="celular">
      <main>
        <form id="form-login" class="form-login" novalidate>
          <h1 class="logo-login">Jovi Camera</h1>
          <p class="subtitulo-login">Entre com sua conta</p>

          <div class="campo">   
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com">
            <span class="erro" id="erro-email"></span>
          </div>

          <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres">
            <span class="erro" id="erro-senha"></span>
          </div>

          <button type="submit" class="botao-primario">Entrar</button>

          <a href="#" class="link">Esqueci minha senha</a>
          <a href="#" class="link" id="link-cadastro">Não tem conta? Cadastre-se</a>
        </form>
      </main>
    </div>

    <script src="../js/script.js"></script>
  </body>
  </html>
